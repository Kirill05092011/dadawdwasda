<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>1000 TABS + 100 GB RAM</title>
    <style>
        body {
            background: #0a0f0f;
            color: #0ff;
            font-family: 'Courier New', monospace;
            text-align: center;
            padding: 50px;
        }
        button {
            background: #ff0000;
            border: none;
            color: #fff;
            font-size: 2em;
            padding: 20px 40px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 30px red;
            transition: 0.2s;
        }
        button:hover {
            background: #aa0000;
            box-shadow: 0 0 40px #ff5555;
        }
        p {
            font-size: 1.2em;
            margin-top: 30px;
            color: #8ff;
        }
        #status {
            color: #ffaa00;
            font-size: 1.5em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🔥 АНТИ-ДОТ: РЕЖИМ 1000 ВКЛАДОК 🔥</h1>
    <button id="startBtn">ЗАПУСТИТЬ 1000 ВКЛАДОК И 100 ГБ</button>
    <p>⚠️ Это может уничтожить браузер. Ты предупреждён.</p>
    <div id="status">Ожидание...</div>

    <script>
        document.getElementById('startBtn').addEventListener('click', function() {
            const status = document.getElementById('status');
            status.innerText = 'Запуск...';

            // Открываем 1000 вкладок (с небольшой задержкой, чтобы не заблокировать UI)
            status.innerText = 'Открываю 1000 вкладок...';
            for (let i = 0; i < 1000; i++) {
                setTimeout(() => {
                    window.open(window.location.href, '_blank');
                }, i * 20); // небольшая задержка между открытиями
            }

            // Пытаемся занять 100 ГБ памяти в текущей вкладке
            status.innerText = 'Выделяю 100 ГБ памяти...';
            setTimeout(() => {
                try {
                    const memoryChunks = [];
                    const targetBytes = 100 * 1024 * 1024 * 1024; // 100 ГБ
                    const chunkSize = 100 * 1024 * 1024; // 100 МБ
                    let allocated = 0;

                    function allocate() {
                        while (allocated < targetBytes) {
                            let chunk = new ArrayBuffer(chunkSize);
                            memoryChunks.push(chunk);
                            allocated += chunkSize;
                            status.innerText = `Выделено ${(allocated / (1024*1024*1024)).toFixed(1)} ГБ...`;
                        }
                        status.innerText = '100 ГБ выделено (теоретически). Браузер должен упасть.';
                    }

                    // Запускаем в отдельном потоке через setTimeout, чтобы не заблокировать интерфейс
                    setTimeout(allocate, 100);
                } catch (e) {
                    status.innerText = 'Ошибка выделения памяти: ' + e;
                }
            }, 1000);
        });
    </script>
</body>
</html>
